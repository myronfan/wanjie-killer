name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 防止多个部署并发
concurrency:
  group: pages
  cancel-in-progress: false

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Debug npm config
        run: |
          echo "USER_CONFIG: $NPM_CONFIG_USERCONFIG"
          echo "GLOBALCONFIG: $NPM_CONFIG_GLOBALCONFIG"
          npm config get registry
          cat ~/.npmrc 2>/dev/null || echo "no ~/.npmrc"
          cat /etc/npmrc 2>/dev/null || echo "no /etc/npmrc"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --registry=https://registry.npmjs.org/ --prefer-online --no-cache

      - name: Build
        working-directory: ./frontend
        env:
          NODE_ENV: production
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
