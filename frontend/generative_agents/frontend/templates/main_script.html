<script>
	// 全局变量
	var personas = {};
	var pronunciatios = {};
	var lastDir = {};

	// Phaser configuration — 真实时模式，固定 canvas 尺寸，缩放交给 Phaser scale
	const MAP_W = 4400, MAP_H = 3200;
	const config = {
		type: Phaser.AUTO,
		width: MAP_W,
		height: MAP_H,
		parent: "game-container",
		mode: Phaser.Scale.FIT,
		autoCenter: Phaser.Scale.CENTER_BOTH,
		pixelArt: true,
		physics: {
			default: "arcade",
			arcade: {
				gravity: { y: 0 }
			}
		},
		scene: {
			preload: preload,
			create: create,
			update: update
		},
		scale: {
			zoom: zoom,
			autoRound: false
		}
	};

	const game = new Phaser.Game(config);
	let cursors;
	let player;

	function preload() {
		this.load.crossOrigin = "";
		this.load.image("blocks_1", "static/assets/village/tilemap/blocks_1.png");
		this.load.image("walls", "static/assets/village/tilemap/Room_Builder_32x32.png");
		this.load.image("interiors_pt1", "static/assets/village/tilemap/interiors_pt1.png");
		this.load.image("interiors_pt2", "static/assets/village/tilemap/interiors_pt2.png");
		this.load.image("interiors_pt3", "static/assets/village/tilemap/interiors_pt3.png");
		this.load.image("interiors_pt4", "static/assets/village/tilemap/interiors_pt4.png");
		this.load.image("interiors_pt5", "static/assets/village/tilemap/interiors_pt5.png");
		this.load.image("CuteRPG_Field_B", "static/assets/village/tilemap/CuteRPG_Field_B.png");
		this.load.image("CuteRPG_Field_C", "static/assets/village/tilemap/CuteRPG_Field_C.png");
		this.load.image("CuteRPG_Harbor_C", "static/assets/village/tilemap/CuteRPG_Harbor_C.png");
		this.load.image("CuteRPG_Village_B", "static/assets/village/tilemap/CuteRPG_Village_B.png");
		this.load.image("CuteRPG_Forest_B", "static/assets/village/tilemap/CuteRPG_Forest_B.png");
		this.load.image("CuteRPG_Desert_C", "static/assets/village/tilemap/CuteRPG_Desert_C.png");
		this.load.image("CuteRPG_Desert_B", "static/assets/village/tilemap/CuteRPG_Desert_B.png");
		this.load.image("CuteRPG_Forest_C", "static/assets/village/tilemap/CuteRPG_Forest_C.png");
		this.load.image("CuteRPG_Harbor_D", "static/assets/village/tilemap/CuteRPG_Harbor_D.png");
		this.load.image("CuteRPG_Mountains_B", "static/assets/village/tilemap/CuteRPG_Mountains_B.png");
		this.load.tilemapTiledJSON("tilemap", "static/assets/village/tilemap/tilemap.json");
		for (const name of Object.keys(persona_names)) {
			this.load.atlas(name, `static/assets/village/agents/${name}/texture.png`, `static/assets/village/agents/sprite.json`);
		}
	}

	function create() {
		const map = this.make.tilemap({ key: "tilemap" });
		const ground_tiles = [
			map.addTilesetImage("blocks_1"),
			map.addTilesetImage("CuteRPG_Field_B"),
			map.addTilesetImage("CuteRPG_Field_C"),
			map.addTilesetImage("CuteRPG_Forest_B"),
			map.addTilesetImage("CuteRPG_Forest_C"),
			map.addTilesetImage("CuteRPG_Harbor_C"),
			map.addTilesetImage("CuteRPG_Harbor_D"),
			map.addTilesetImage("CuteRPG_Desert_B"),
			map.addTilesetImage("CuteRPG_Desert_C"),
			map.addTilesetImage("CuteRPG_Mountains_B"),
			map.addTilesetImage("CuteRPG_Village_B")
		];
		const object_tiles = [
			map.addTilesetImage("interiors_pt1"),
			map.addTilesetImage("interiors_pt2"),
			map.addTilesetImage("interiors_pt3"),
			map.addTilesetImage("interiors_pt4"),
			map.addTilesetImage("interiors_pt5"),
			map.addTilesetImage("walls")
		];
		const ground_layer = map.createLayer("ground", ground_tiles, 0, 0).setDepth(-2);
		map.createLayer("object", object_tiles, 0, 0).setDepth(-1);
		map.createLayer("overlap", object_tiles, 0, 0).setDepth(0);
		map.createLayer("height", object_tiles, 0, 0).setDepth(1);

		const spawn_tile_loc = {{ persona_init_pos|tojson }};

		// 全局 record：每个 agent 的"希望位置"(LLM 决策)，供 update() 平滑移动使用
		window._agentTarget = window._agentTarget || {};
		window._agentAction = window._agentAction || {};
		window._agentLocation = window._agentLocation || {};
		window._agentLast = window._agentLast || {};
		window._agentWalkState = window._agentWalkState || {};  // {name: {anim:'walk_left'|'walk_right'|'walk_down'|'walk_up'|null, until:ts}}
		window._agentWalkFrames = window._agentWalkFrames || {}; // {name: count}

		for (var name in spawn_tile_loc) {
			const x = spawn_tile_loc[name][0] * 32 + 16;
			const y = spawn_tile_loc[name][1] * 32 + 16;
			const sprite = this.physics.add.sprite(x, y, name, "down").setDepth(2).setScale(1);
			window._agentTarget[name] = [x, y];
			window._agentLast[name] = [x, y];
			personas[name] = sprite;
			// 名字标签
			const label = this.add.text(x, y - 24, name, {
				font: "12px monospace",
				fill: "#ffffff",
				backgroundColor: "#222222",
				padding: { x: 4, y: 2 },
				align: "center"
			}).setOrigin(0.5, 1).setDepth(3);
			pronunciatios[name] = label;
			// 单击 agent 切换显示 action 浮窗
			sprite.setInteractive();
			sprite.on('pointerdown', () => showActionTip(name));
		}
		this.cameras.main.setBackgroundColor("#9ccef0");
		this.cameras.main.centerOn(MAP_W/2, MAP_H/2);
	}

	// === 平滑移动 + LLM 决策驱动 ===
	function update(time, delta) {
		const speed = 60;  // 像素/秒
		const stepPx = Math.max(1, Math.round(speed * delta / 1000));
		for (const name of Object.keys(personas)) {
			const sprite = personas[name];
			const tx = (window._agentTarget[name] && window._agentTarget[name][0]) || sprite.x;
			const ty = (window._agentTarget[name] && window._agentTarget[name][1]) || sprite.y;
			const dx = tx - sprite.x;
			const dy = ty - sprite.y;
			const dist = Math.sqrt(dx*dx + dy*dy);
			if (dist > 1) {
				// 走
				const nx = dist <= stepPx ? tx : sprite.x + (dx/dist) * stepPx;
				const ny = dist <= stepPx ? ty : sprite.y + (dy/dist) * stepPx;
				sprite.setPosition(nx, ny);
				if (Math.abs(dx) > Math.abs(dy)) {
					sprite.anims.play(name + (dx > 0 ? '-right-walk' : '-left-walk'), true);
				} else {
					sprite.anims.play(name + (dy > 0 ? '-down-walk' : '-up-walk'), true);
				}
			} else {
				// 停下
				sprite.anims.stop();
				const frameName = lastDir[name] || 'down';
				sprite.setTexture(name, frameName);
			}
			// 名字标签跟随
			if (pronunciatios[name]) {
				pronunciatios[name].setPosition(sprite.x, sprite.y - 18);
			}
		}
	}

	// === 真正的实时数据源：SSE ===
	let _lastStep = null;
	// 处理一帧movement
	function applyMovement(data) {
		if (data.type === 'init' && data.movement) {
			// 首次：把最后的 frame 给所有 agent
			for (const a of Object.keys(data.movement)) {
				const f = data.movement[a];
				if (f && f.movement) {
					window._agentTarget[a] = [f.movement[0]*32, f.movement[1]*32];
					window._agentAction[a] = f.action || '';
					window._agentLocation[a] = f.location || '';
				}
			}
		} else if (data.type === 'step' && data.movement) {
			// 新 step
			for (const a of Object.keys(data.movement)) {
				const f = data.movement[a];
				if (f && f.movement) {
					const newX = f.movement[0]*32, newY = f.movement[1]*32;
					if (window._agentTarget[a]) {
						window._agentLast[a] = window._agentTarget[a];
					}
					window._agentTarget[a] = [newX, newY];
					window._agentAction[a] = f.action || '';
					window._agentLocation[a] = f.location || '';
				}
			}
		}
	}

	let _sseOk = false;
	function startSSE() {
		if (!window.NAME) return;
		try {
			const es = new EventSource('/api/stream?name=' + encodeURIComponent(window.NAME));
			es.onmessage = (ev) => {
				try { _sseOk = true; applyMovement(JSON.parse(ev.data)); } catch (e) {}
			};
			let _errCount = 0;
			es.onerror = () => {
				_errCount++;
				// 如果 1 秒内没收到数据 fallback 到 1 秒轮询
				if (_errCount >= 1) {
					try { es.close(); } catch(e){}
					startPolling();
				}
			};
		} catch (e) { startPolling(); }
	}

	function startPolling() {
		// 初始一次立即拉
		let _lastStep = null;
		async function pull() {
			try {
				const r = await fetch('/api/latest_step.json?name=' + encodeURIComponent(window.NAME), {cache: 'no-store'});
				if (!r.ok) return;
				const data = await r.json();
				if (data.latest_key && data.latest_key !== _lastStep) {
					_lastStep = data.latest_key;
					const frame = data.movement[data.latest_key];
					if (frame) applyMovement({type: 'step', movement: frame});
				}
			} catch (e) {}
		}
		pull();
		setInterval(pull, 1000);  // 1 秒轮询 — 几乎跟实时一样
	}

	// 鼠标 hover 显示 action tip
	function showActionTip(name) {
		const tip = document.getElementById('action-tooltip');
		if (!tip) return;
		document.getElementById('tip-name').textContent = name;
		document.getElementById('tip-action').textContent = window._agentAction[name] || '(无)';
		document.getElementById('tip-loc').textContent = window._agentLocation[name] || '';
		tip.style.display = 'block';
		setTimeout(() => { tip.style.display = 'none'; }, 6000);
	}

	// 控制按钮
	document.addEventListener('DOMContentLoaded', () => {
		const slider = document.getElementById('zoom-slider');
		const val = document.getElementById('zoom-val');
		if (slider) {
			const cur = new URLSearchParams(location.search);
			if (cur.has('zoom')) {
				const z = parseFloat(cur.get('zoom'));
				if (!isNaN(z) && z >= 0.3 && z <= 2.5) { slider.value = z; val.textContent = z.toFixed(2)+'x'; }
			}
			slider.addEventListener('input', () => { val.textContent = parseFloat(slider.value).toFixed(2)+'x'; });
			slider.addEventListener('change', () => {
				const url = new URL(location.href);
				url.searchParams.set('zoom', slider.value);
				location.href = url.toString();
			});
		}
		const toggle = document.getElementById('persona-toggle');
		if (toggle) {
			toggle.addEventListener('click', () => {
				for (const n of Object.keys(pronunciatios)) {
					pronunciatios[n].visible = !pronunciatios[n].visible;
				}
				toggle.textContent = toggle.textContent.includes('隐藏') ? '🔠 显示名字' : '🔠 隐藏名字';
			});
		}
		startSSE();  // 失败会 fallback 到 1s 轮询
	});
</script>
</script>
